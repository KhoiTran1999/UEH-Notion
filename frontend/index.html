<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <div id="app" class="max-w-md mx-auto p-4 flex flex-col h-screen">

        <!-- Loading State -->
        <div id="loading-view" class="hidden flex-1 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p id="loading-text" class="text-gray-600 text-center">Loading...</p>
        </div>

        <!-- Topics View -->
        <div id="topics-view" class="flex-1 flex flex-col">
            <h1 class="text-2xl font-bold mb-6 text-center">Select a Topic</h1>
            <div id="topics-list" class="space-y-3 overflow-y-auto pb-4">
                <!-- Topics injected here -->
            </div>
            <div id="no-topics" class="hidden text-center text-gray-500 mt-10">
                No topics available for review.
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="hidden flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 id="quiz-topic-title" class="text-xl font-bold truncate">Topic</h2>
                <span id="quiz-progress" class="text-sm font-medium text-gray-500">1/5</span>
            </div>

            <!-- Flashcard Container -->
            <div class="flex-1 flex flex-col items-center justify-center relative w-full perspective-1000">
                <div id="flashcard" class="flashcard w-full h-64 cursor-pointer relative group">
                    <div class="flashcard-inner relative w-full h-full text-center shadow-lg rounded-xl">
                        <!-- Front (Question) -->
                        <div class="flashcard-front absolute w-full h-full bg-white rounded-xl p-6 flex flex-col items-center justify-center border-2 border-blue-100">
                            <span class="text-xs font-bold text-blue-500 uppercase tracking-wide absolute top-4">Question</span>
                            <p id="question-text" class="text-lg font-medium">What is the question?</p>
                            <span class="text-xs text-gray-400 absolute bottom-4">Tap to reveal answer</span>
                        </div>
                        <!-- Back (Answer) -->
                        <div class="flashcard-back absolute w-full h-full bg-blue-50 rounded-xl p-6 flex flex-col items-center justify-center border-2 border-blue-200 overflow-y-auto">
                            <span class="text-xs font-bold text-green-500 uppercase tracking-wide absolute top-4">Answer</span>
                            <p id="answer-text" class="text-base mt-6">This is the answer.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Controls -->
            <div class="mt-6 space-y-4">
                <button id="next-btn" class="hidden w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-600 transition">
                    Next Question
                </button>

                <!-- Final Status Buttons -->
                <div id="status-btns" class="hidden flex space-x-3">
                    <button id="status-chua-btn" class="flex-1 bg-red-100 text-red-700 font-bold py-3 px-2 rounded-lg border border-red-200 hover:bg-red-200 transition">
                        Chưa nắm vững
                    </button>
                    <button id="status-nam-btn" class="flex-1 bg-green-500 text-white font-bold py-3 px-2 rounded-lg shadow hover:bg-green-600 transition">
                        Nắm vững
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
