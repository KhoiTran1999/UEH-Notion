<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <div id="app" class="max-w-md mx-auto p-4 flex flex-col h-screen">

        <!-- Loading State -->
        <div id="loading-view" class="hidden flex-1 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p id="loading-text" class="text-gray-600 text-center">Đang tải...</p>
        </div>

        <!-- Topics View -->
        <div id="topics-view" class="flex-1 flex flex-col">
            <h1 class="text-2xl font-bold mb-6 text-center">Chọn chủ đề ôn tập</h1>
            <div id="topics-list" class="space-y-3 overflow-y-auto pb-4">
                <!-- Topics injected here -->
            </div>
            <div id="no-topics" class="hidden text-center text-gray-500 mt-10">
                Không có chủ đề nào cần ôn tập.
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="hidden flex-1 flex flex-col overflow-y-auto bg-white p-4 rounded-xl shadow">
            <div class="flex items-center justify-between mb-4 border-b pb-2">
                <div class="flex items-center space-x-2 min-w-0">
                    <button id="close-quiz-btn" class="text-gray-500 hover:text-gray-700 flex items-center justify-center p-1.5 rounded-lg hover:bg-gray-100 transition mr-1" title="Quay lại">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </button>
                    <h2 id="quiz-topic-title" class="text-lg font-bold truncate text-gray-800">Topic</h2>
                </div>
                <span id="quiz-progress" class="text-sm font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">1/5</span>
            </div>

            <div id="quiz-content" class="fade-in">
                <div id="question-text" class="text-lg md:text-xl font-bold text-gray-800 mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">What is the question?</div>
                <div id="options-container" class="space-y-4 mt-4 flex flex-col"></div>
                <div id="explanation-box" class="hidden mt-6 p-4 rounded-xl bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 shadow-inner text-sm md:text-base leading-relaxed text-gray-700"></div>
            </div>

            <!-- Quiz Results -->
            <div id="quiz-results" class="hidden fade-in flex-1 flex flex-col items-center justify-center text-center space-y-6 py-6">
                <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 w-full shadow-sm space-y-4">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 text-3xl mb-2">
                        🏆
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">Kết quả ôn tập</h3>

                    <div class="space-y-1">
                        <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">Điểm số của bạn</p>
                        <div class="text-4xl font-extrabold text-blue-600" id="results-score">0 / 0</div>
                        <p class="text-sm font-semibold text-blue-500" id="results-percentage">0%</p>
                    </div>

                    <p id="results-feedback" class="text-gray-700 text-sm md:text-base leading-relaxed px-2 font-medium">
                        Phản hồi
                    </p>
                </div>
            </div>

            <!-- Quiz Controls -->
            <div class="mt-6 space-y-4">
                <div id="nav-btns" class="flex space-x-3">
                    <button id="prev-btn" class="hidden flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg shadow hover:bg-gray-300 transition">
                        Câu trước
                    </button>
                    <button id="next-btn" class="hidden flex-1 bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-600 transition">
                        Câu tiếp
                    </button>
                </div>

                <button id="show-results-btn" class="hidden w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-600 transition">
                    Xem kết quả
                </button>

                <!-- Final Status Buttons -->
                <div id="status-btns" class="hidden flex space-x-3">
                    <button id="status-chua-btn" class="flex-1 bg-red-100 text-red-700 font-bold py-3 px-2 rounded-lg border border-red-200 hover:bg-red-200 transition">
                        Chưa nắm vững
                    </button>
                    <button id="status-nam-btn" class="flex-1 bg-green-500 text-white font-bold py-3 px-2 rounded-lg shadow hover:bg-green-600 transition">
                        Nắm vững
                    </button>
                </div>

                <button id="force-refresh-btn" class="mt-4 w-full text-center text-gray-500 hover:text-blue-500 underline text-sm">
                    Tạo đề mới (Bỏ qua lưu cache)
                </button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
